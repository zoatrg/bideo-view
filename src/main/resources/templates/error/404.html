<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없습니다 - Bideo</title>
    <link rel="stylesheet" href="../../static/css/common/reset.css" />
    <link rel="stylesheet" href="../../static/css/common/font.css" />
    <link rel="stylesheet" href="../../static/css/common/global.css" />
    <link rel="stylesheet" href="../../static/css/error/404.css" />
</head>
<body>

<div class="Error-Page">
    <div class="Error-Container">

        <!-- 일러스트 -->
        <div class="Error-Illustration">
            <div class="Error-Icon-Group">
                <div class="Error-Icon-Circle">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5Zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14Z" fill="currentColor"/>
                    </svg>
                </div>
                <span class="Error-Code">404</span>
            </div>
        </div>

        <!-- 텍스트 -->
        <h1 class="Error-Title">페이지를 찾을 수 없습니다</h1>
        <p class="Error-Description">요청하신 페이지가 존재하지 않거나, 이동되었거나, 삭제되었을 수 있습니다.</p>

        <!-- 액션 버튼 -->
        <div class="Error-Actions">
            <a href="/" class="Error-Button-Primary">홈으로 돌아가기</a>
            <button class="Error-Button-Outline" onclick="history.back()">이전 페이지</button>
        </div>

        <!-- 도움말 링크 -->
        <div class="Error-Help">
            <span class="Error-Help-Text">문제가 계속되면</span>
            <a href="#" class="Error-Help-Link">고객센터</a>
            <span class="Error-Help-Text">에 문의해 주세요.</span>
        </div>

    </div>
</div>

</body>
</html>
