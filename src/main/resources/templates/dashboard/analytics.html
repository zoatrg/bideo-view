<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>채널 분석</title>
    <link rel="stylesheet" href="../../static/css/common/reset.css" />
    <link rel="stylesheet" href="../../static/css/common/global.css" />
    <link rel="stylesheet" href="../../static/css/common/font.css" />
    <!-- <link rel="stylesheet" href="../../static/css/common/common.css" /> -->
    <link rel="stylesheet" href="../../static/css/common/util.css" />
    <link rel="stylesheet" href="../../static/css/dashboard/analytics.css" />
</head>
<body>

<div class="Analytics-Page">

    <!-- ===== 페이지 헤더 ===== -->
    <div class="Analytics-Page-Header">
        <h1 class="Analytics-Page-Title">채널 분석</h1>
        <div class="Analytics-Advanced-Mode">
            <a class="Analytics-Advanced-Link" href="#">
                <button class="Analytics-Button-Tonal">고급 모드</button>
            </a>
        </div>
    </div>

    <!-- ===== 탭바 + 기간 선택 ===== -->
    <div class="Analytics-ActionBar">
        <div class="Analytics-ActionBar-Primary">
            <div class="Analytics-Tabs">
                <div class="Analytics-Tab Analytics-Tab--selected" role="tab" aria-selected="true">
                    <span class="Analytics-Tab-Text">개요</span>
                    <div class="Analytics-Tab-Indicator"></div>
                </div>
                <div class="Analytics-Tab" role="tab" aria-selected="false">
                    <span class="Analytics-Tab-Text">콘텐츠</span>
                </div>
                <div class="Analytics-Tab" role="tab" aria-selected="false">
                    <span class="Analytics-Tab-Text">시청자층</span>
                </div>
                <div class="Analytics-Tab" role="tab" aria-selected="false">
                    <span class="Analytics-Tab-Text">트렌드</span>
                </div>
            </div>
        </div>
        <div class="Analytics-ActionBar-Secondary">
            <div class="Analytics-TimePicker" role="button">
                <div class="Analytics-TimePicker-Label">2026. 3. 3. ~ 2026. 3. 30.</div>
                <div class="Analytics-TimePicker-Value">지난 28일</div>
                <svg class="Analytics-TimePicker-Arrow" xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 0 24 24" width="24">
                    <path d="M18.707 8.793a1 1 0 00-1.414 0L12 14.086 6.707 8.793a1 1 0 10-1.414 1.414L12 16.914l6.707-6.707a1 1 0 000-1.414Z"></path>
                </svg>
            </div>
        </div>
    </div>

    <!-- ===== 탭바 하단 구분선 ===== -->
    <div class="Analytics-Divider"></div>

    <!-- ===== 메인 콘텐츠 영역 ===== -->
    <div class="Analytics-Content">

        <!-- 좌측: 차트 영역 -->
        <div class="Analytics-Main">

            <!-- 요약 헤더 -->
            <div class="Analytics-Overview-Header">
                <h2 class="Analytics-Overview-Title">지난 28일 동안 채널의 조회수가 없습니다</h2>
            </div>

            <!-- 핵심 지표 카드 -->
            <div class="Analytics-KeyMetric-Card">
                <div class="Analytics-KeyMetric-Header">
                    <div class="Analytics-KeyMetric-Block Analytics-KeyMetric-Block--selected" role="option" aria-selected="true">
                        <div class="Analytics-KeyMetric-Label">조회수</div>
                        <div class="Analytics-KeyMetric-Value">—</div>
                    </div>
                    <div class="Analytics-KeyMetric-Block" role="option" aria-selected="false">
                        <div class="Analytics-KeyMetric-Label">시청 시간(단위: 시간)</div>
                        <div class="Analytics-KeyMetric-Value">—</div>
                    </div>
                    <div class="Analytics-KeyMetric-Block" role="option" aria-selected="false">
                        <div class="Analytics-KeyMetric-Label">구독자</div>
                        <div class="Analytics-KeyMetric-Value">—</div>
                    </div>
                </div>

                <!-- 차트 영역 -->
                <div class="Analytics-Chart-Area">
                    <div class="Analytics-Chart">
                        <!-- Y축 -->
                        <div class="Analytics-Chart-YAxis">
                            <span class="Analytics-Chart-YLabel">3</span>
                            <span class="Analytics-Chart-YLabel">2</span>
                            <span class="Analytics-Chart-YLabel">1</span>
                            <span class="Analytics-Chart-YLabel">0</span>
                        </div>
                        <!-- 그리드 + 라인 -->
                        <div class="Analytics-Chart-Grid">
                            <div class="Analytics-Chart-GridLine"></div>
                            <div class="Analytics-Chart-GridLine"></div>
                            <div class="Analytics-Chart-GridLine"></div>
                            <div class="Analytics-Chart-GridLine Analytics-Chart-GridLine--bottom"></div>
                            <div class="Analytics-Chart-DataLine"></div>
                        </div>
                    </div>
                    <!-- X축 -->
                    <div class="Analytics-Chart-XAxis">
                        <span class="Analytics-Chart-XLabel">2026. 3. 3.</span>
                        <span class="Analytics-Chart-XLabel">2026. 3. 8.</span>
                        <span class="Analytics-Chart-XLabel">2026. 3. 12.</span>
                        <span class="Analytics-Chart-XLabel">2026. 3. 17.</span>
                        <span class="Analytics-Chart-XLabel">2026. 3. 21.</span>
                        <span class="Analytics-Chart-XLabel">2026. 3. 26.</span>
                        <span class="Analytics-Chart-XLabel">2026. 3....</span>
                    </div>
                </div>

                <!-- 더보기 버튼 -->
                <div class="Analytics-Card-Footer">
                    <button class="Analytics-Button-Tonal">더보기</button>
                </div>
            </div>

        </div>

        <!-- 우측: 실시간 사이드바 -->
        <div class="Analytics-Sidebar">
            <div class="Analytics-Realtime-Card">

                <!-- 실시간 헤더 -->
                <div class="Analytics-Realtime-Header">
                    <h2 class="Analytics-Realtime-Title">실시간</h2>
                    <div class="Analytics-Realtime-Status">
                        <span class="Analytics-Realtime-Dot"></span>
                        <span class="Analytics-Realtime-StatusText">실시간 업데이트 중</span>
                    </div>
                </div>

                <div class="Analytics-Realtime-Divider"></div>

                <!-- 구독자 -->
                <div class="Analytics-Realtime-Metric">
                    <div class="Analytics-Realtime-MetricValue">—</div>
                    <div class="Analytics-Realtime-MetricLabel">구독자</div>
                </div>

                <button class="Analytics-Button-Tonal">실시간 집계 보기</button>

                <div class="Analytics-Realtime-Divider"></div>

                <!-- 조회수 48시간 -->
                <div class="Analytics-Realtime-Metric">
                    <div class="Analytics-Realtime-MetricValue">0</div>
                    <div class="Analytics-Realtime-MetricLabel">조회수 · 지난 48시간</div>
                </div>

                <!-- 미니 스파크라인 -->
                <div class="Analytics-Realtime-Sparkline">
                    <div class="Analytics-Sparkline-Bar"></div>
                </div>
                <div class="Analytics-Sparkline-XAxis">
                    <span class="Analytics-Sparkline-XLabel">48시간 전</span>
                    <span class="Analytics-Sparkline-XLabel">현재</span>
                </div>

                <!-- 더보기 -->
                <div class="Analytics-Realtime-Footer">
                    <button class="Analytics-Button-Tonal">더보기</button>
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
