<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='reports'">
<head>
    <meta charset="UTF-8">
    <title>신고 상세 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <a th:href="@{/admin/reports}" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        목록으로 돌아가기
    </a>
    <div class="page-header">
        <h1 class="page-title">신고 상세
            <span th:if="${report.status == 'PENDING'}" class="status-badge status-pending">접수됨</span>
            <span th:if="${report.status == 'REVIEWING'}" class="status-badge status-pending">검토중</span>
            <span th:if="${report.status == 'RESOLVED'}" class="status-badge status-active">처리완료</span>
            <span th:if="${report.status == 'CANCELLED'}" class="status-badge status-muted">취소됨</span>
        </h1>
    </div>
    <div class="detail-layout">
        <div class="detail-main">
            <div class="detail-section">
                <h3 class="detail-section-title">신고 정보</h3>
                <div class="detail-field"><span class="detail-field-label">신고자</span><span class="detail-field-value" th:text="${report.reporterNickname}">신고자</span></div>
                <div class="detail-field"><span class="detail-field-label">신고 분류</span><span class="detail-field-value" th:text="${report.category}">WORK</span></div>
                <div class="detail-field"><span class="detail-field-label">접수일</span><span class="detail-field-value" th:text="${report.createdAt}">2024-01-01</span></div>
            </div>
            <div class="detail-section">
                <h3 class="detail-section-title">신고 사유</h3>
                <div class="detail-field"><span class="detail-field-label">사유</span><span class="detail-field-value" th:text="${report.reason}">신고 사유</span></div>
                <div class="detail-field" th:if="${report.reasonDetail != null}"><span class="detail-field-label">상세 내용</span><span class="detail-field-value" th:text="${report.reasonDetail}">상세</span></div>
            </div>
            <div class="detail-section">
                <h3 class="detail-section-title">신고 대상</h3>
                <div class="detail-field"><span class="detail-field-label">대상 유형</span><span class="detail-field-value" th:text="${report.targetType}">작품</span></div>
                <div class="detail-field"><span class="detail-field-label">대상</span><span class="detail-field-value" th:text="${report.targetName}">대상명</span></div>
            </div>
        </div>
        <div class="detail-sidebar">
            <div class="detail-sidebar-card">
                <div class="detail-sidebar-title">처리 상태</div>
                <div style="margin-bottom:16px">
                    <span th:if="${report.status == 'PENDING'}" class="status-badge status-pending">접수됨</span>
                    <span th:if="${report.status == 'REVIEWING'}" class="status-badge status-pending">검토중</span>
                    <span th:if="${report.status == 'RESOLVED'}" class="status-badge status-active">처리완료</span>
                    <span th:if="${report.status == 'CANCELLED'}" class="status-badge status-muted">취소됨</span>
                </div>
                <button th:if="${report.status == 'PENDING' or report.status == 'REVIEWING'}" class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="openModal('resolveModal')">처리완료</button>
                <button th:if="${report.status == 'PENDING' or report.status == 'REVIEWING'}" class="btn btn-outline" style="width:100%" onclick="openModal('cancelModal')">취소</button>
            </div>
        </div>
    </div>
</div>
<div layout:fragment="modals">
    <div class="modal-overlay" id="resolveModal"><div class="modal"><div class="modal-header">신고 처리 완료</div><div class="modal-body">이 신고를 처리 완료로 변경합니다.</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('resolveModal')">취소</button><button class="btn btn-primary">확인</button></div></div></div>
    <div class="modal-overlay" id="cancelModal"><div class="modal"><div class="modal-header">신고 취소</div><div class="modal-body">이 신고를 취소 처리합니다.</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('cancelModal')">취소</button><button class="btn btn-danger">확인</button></div></div></div>
</div>
</body>
</html>
