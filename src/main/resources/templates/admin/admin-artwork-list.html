<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='artworks'">
<head>
    <meta charset="UTF-8">
    <title>작품관리 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <div class="page-header"><h1 class="page-title">작품관리</h1></div>
    <div class="filter-bar">
        <div class="filter-search">
            <svg class="filter-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchInput" placeholder="작품명 또는 아티스트 검색...">
        </div>
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="all">전체</button>
            <button class="filter-tab" data-status="DISPLAY">전시중</button>
            <button class="filter-tab" data-status="HIDDEN">숨김</button>
        </div>
    </div>
    <table class="data-table">
        <thead><tr>
            <th style="width:80px">번호</th><th>작품명</th><th style="width:140px">아티스트</th>
            <th style="width:120px">카테고리</th><th style="width:80px">상태</th>
            <th style="width:100px">신고 누적 수</th><th style="width:60px">상세</th>
        </tr></thead>
        <tbody>
        <tr th:each="artwork, iter : ${artworkList}">
            <td th:text="'#A-' + ${artwork.id}">A-102</td>
            <td th:text="${artwork.title}">작품명</td>
            <td th:text="${artwork.artistName}">아티스트</td>
            <td th:text="${artwork.category}">Digital Art</td>
            <td>
                <span th:if="${artwork.status == 'DISPLAY'}" class="status-badge status-active">전시중</span>
                <span th:if="${artwork.status == 'HIDDEN'}" class="status-badge status-urgent">숨김</span>
            </td>
            <td th:text="${artwork.reportCount}">0</td>
            <td><a th:href="@{/admin/artworks/{id}(id=${artwork.id})}" class="btn-link">상세</a></td>
        </tr>
        </tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <p class="empty-state-text">등록된 작품이 없습니다</p>
    </div>
</div>
</body>
</html>
