<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='withdrawals'">
<head>
    <meta charset="UTF-8">
    <title>출금승인관리 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <div class="page-header"><h1 class="page-title">출금승인관리</h1></div>
    <div class="filter-bar">
        <div class="filter-search">
            <svg class="filter-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchInput" placeholder="아티스트명 검색...">
        </div>
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="all">전체</button>
            <button class="filter-tab" data-status="PENDING">승인대기</button>
            <button class="filter-tab" data-status="APPROVED">승인완료</button>
        </div>
    </div>
    <table class="data-table">
        <thead><tr>
            <th style="width:100px">요청번호</th><th style="width:140px">아티스트</th>
            <th style="width:130px">신청 금액</th><th style="width:130px">실 수령액</th>
            <th style="width:90px">상태</th><th style="width:60px">상세</th>
        </tr></thead>
        <tbody>
        <tr th:each="wd, iter : ${withdrawalList}">
            <td th:text="'WDL-' + ${wd.id}">WDL-772</td>
            <td th:text="${wd.artistName}">아티스트</td>
            <td th:text="${#numbers.formatInteger(wd.requestAmount, 0, 'COMMA')} + ' 원'">₩500,000</td>
            <td class="fw-500" style="color:var(--admin-status-active)" th:text="${#numbers.formatInteger(wd.actualAmount, 0, 'COMMA')} + ' 원'">₩467,000</td>
            <td>
                <span th:if="${wd.status == 'PENDING'}" class="status-badge status-pending">승인대기</span>
                <span th:if="${wd.status == 'APPROVED'}" class="status-badge status-active">승인완료</span>
                <span th:if="${wd.status == 'REJECTED'}" class="status-badge status-urgent">반려됨</span>
            </td>
            <td><a th:href="@{/admin/withdrawals/{id}(id=${wd.id})}" class="btn-link">상세</a></td>
        </tr>
        </tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
        <p class="empty-state-text">출금 요청이 없습니다</p>
    </div>
</div>
</body>
</html>
