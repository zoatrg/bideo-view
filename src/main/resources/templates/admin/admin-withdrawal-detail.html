<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='withdrawals'">
<head>
    <meta charset="UTF-8">
    <title>출금 상세 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <a th:href="@{/admin/withdrawals}" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        목록으로 돌아가기
    </a>
    <div class="page-header">
        <h1 class="page-title">출금 상세
            <span th:if="${withdrawal.status == 'PENDING'}" class="status-badge status-pending">승인대기</span>
            <span th:if="${withdrawal.status == 'APPROVED'}" class="status-badge status-active">승인완료</span>
            <span th:if="${withdrawal.status == 'REJECTED'}" class="status-badge status-urgent">반려됨</span>
        </h1>
    </div>
    <div class="detail-layout">
        <div class="detail-main">
            <div class="detail-section">
                <h3 class="detail-section-title">아티스트 정보</h3>
                <div class="detail-field"><span class="detail-field-label">닉네임</span><span class="detail-field-value" th:text="${withdrawal.artistName}">아티스트</span></div>
            </div>
            <div class="detail-section">
                <h3 class="detail-section-title">입금 계좌 정보</h3>
                <div class="detail-field"><span class="detail-field-label">은행명</span><span class="detail-field-value" th:text="${withdrawal.bankName}">신한은행</span></div>
                <div class="detail-field"><span class="detail-field-label">계좌번호</span><span class="detail-field-value" style="letter-spacing:1px" th:text="${withdrawal.accountNumber}">110-123-456789</span></div>
            </div>
        </div>
        <div class="detail-sidebar">
            <div class="detail-sidebar-card">
                <div class="detail-sidebar-title">최종 실 수령액</div>
                <div class="detail-sidebar-value" th:text="${withdrawal.actualAmount} + ' 원'">467,000 원</div>
            </div>
            <div class="detail-sidebar-card" th:if="${withdrawal.status == 'PENDING'}">
                <div class="detail-sidebar-title">승인 관리</div>
                <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="openModal('approveModal')">승인</button>
                <button class="btn btn-danger" style="width:100%" onclick="openModal('rejectModal')">반려</button>
            </div>
        </div>
    </div>
</div>
<div layout:fragment="modals">
    <div class="modal-overlay" id="approveModal"><div class="modal"><div class="modal-header">출금 승인</div><div class="modal-body">이 출금 요청을 승인합니다.</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('approveModal')">취소</button><button class="btn btn-primary">승인</button></div></div></div>
    <div class="modal-overlay" id="rejectModal"><div class="modal"><div class="modal-header">출금 반려</div><div class="modal-body"><label>반려 사유</label><textarea placeholder="반려 사유를 입력하세요"></textarea></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('rejectModal')">취소</button><button class="btn btn-danger">반려</button></div></div></div>
</div>
</body>
</html>
