<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='payments'">
<head>
    <meta charset="UTF-8">
    <title>결제내역관리 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <div class="page-header"><h1 class="page-title">결제내역관리</h1></div>
    <div class="filter-bar">
        <div class="filter-search">
            <svg class="filter-search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchInput" placeholder="주문번호 또는 구매자명 검색...">
        </div>
        <div class="filter-tabs">
            <button class="filter-tab active" data-status="all">전체</button>
            <button class="filter-tab" data-status="COMPLETED">결제완료</button>
            <button class="filter-tab" data-status="CANCELLED">결제취소</button>
        </div>
    </div>
    <table class="data-table">
        <thead><tr>
            <th style="width:160px">주문번호</th><th style="width:100px">결제자</th>
            <th style="width:80px">경매/거래</th><th>작품명</th>
            <th style="width:120px">금액</th><th style="width:90px">결제상태</th><th style="width:60px">상세</th>
        </tr></thead>
        <tbody>
        <tr th:each="payment, iter : ${paymentList}">
            <td th:text="${payment.orderNumber}">ORD-20240309-001</td>
            <td th:text="${payment.payerName}">구매자</td>
            <td th:text="${payment.type}">경매</td>
            <td th:text="${payment.artworkTitle}">작품명</td>
            <td th:text="${#numbers.formatInteger(payment.amount, 0, 'COMMA')} + ' 원'">₩1,200,000</td>
            <td>
                <span th:if="${payment.status == 'COMPLETED'}" class="status-badge status-active">결제완료</span>
                <span th:if="${payment.status == 'CANCELLED'}" class="status-badge status-urgent">결제취소</span>
                <span th:if="${payment.status == 'PENDING'}" class="status-badge status-pending">결제대기</span>
            </td>
            <td><a th:href="@{/admin/payments/{id}(id=${payment.id})}" class="btn-link">상세</a></td>
        </tr>
        </tbody>
    </table>
    <div class="empty-state" id="emptyState" style="display:none">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><path d="M1 10h22"/></svg>
        <p class="empty-state-text">결제 내역이 없습니다</p>
    </div>
</div>
</body>
</html>
