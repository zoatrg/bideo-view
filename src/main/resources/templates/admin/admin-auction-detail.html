<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='auctions'">
<head>
    <meta charset="UTF-8">
    <title>경매 상세 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <a th:href="@{/admin/auctions}" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        목록으로 돌아가기
    </a>
    <div class="page-header">
        <h1 class="page-title">경매 상세
            <span th:if="${auction.status == 'ONGOING'}" class="status-badge status-active">진행중</span>
            <span th:if="${auction.status == 'FINISHED'}" class="status-badge status-pending">종료</span>
            <span th:if="${auction.status == 'SCHEDULED'}" class="status-badge status-muted">예정</span>
        </h1>
    </div>
    <div class="detail-layout">
        <div class="detail-main">
            <div class="detail-section">
                <h3 class="detail-section-title">경매 진행 정보</h3>
                <div class="detail-field"><span class="detail-field-label">시작 가격</span><span class="detail-field-value" th:text="${auction.startPrice} + ' 원'">100,000 원</span></div>
                <div class="detail-field"><span class="detail-field-label">입찰 단위</span><span class="detail-field-value" th:text="${auction.bidUnit} + ' 원'">10,000 원</span></div>
                <div class="detail-field"><span class="detail-field-label">현재 최고가</span><span class="detail-field-value fw-700" th:text="${auction.currentPrice} + ' 원'">1,000,000 원</span></div>
            </div>
            <div class="detail-section">
                <h3 class="detail-section-title">일정 정보</h3>
                <div class="detail-field"><span class="detail-field-label">시작 일시</span><span class="detail-field-value" th:text="${auction.startAt}">2024-01-01 10:00</span></div>
                <div class="detail-field"><span class="detail-field-label">종료 일시</span><span class="detail-field-value" th:text="${auction.endAt}">2024-01-07 18:00</span></div>
            </div>
            <div class="detail-section" th:if="${auction.status == 'FINISHED' and auction.winnerId != null}">
                <h3 class="detail-section-title">낙찰자 정보</h3>
                <div class="detail-field"><span class="detail-field-label">낙찰자</span><span class="detail-field-value"><a th:href="@{/admin/members/{id}(id=${auction.winnerId})}" class="text-accent" th:text="${auction.winnerNickname}">낙찰자</a></span></div>
                <div class="detail-field"><span class="detail-field-label">낙찰가</span><span class="detail-field-value fw-700" th:text="${auction.winningPrice} + ' 원'">1,500,000 원</span></div>
            </div>
        </div>
        <div class="detail-sidebar">
            <div class="detail-sidebar-card">
                <div class="detail-sidebar-title">최고 입찰가</div>
                <div class="detail-sidebar-value" th:text="${auction.currentPrice} + ' 원'">1,000,000 원</div>
            </div>
            <div class="detail-sidebar-card" th:if="${auction.status == 'ONGOING'}">
                <div class="detail-sidebar-title">경매 관리</div>
                <button class="btn btn-danger" style="width:100%" onclick="openModal('endModal')">경매 강제 종료</button>
            </div>
        </div>
    </div>
</div>
<div layout:fragment="modals">
    <div class="modal-overlay" id="endModal"><div class="modal"><div class="modal-header">경매 강제 종료</div><div class="modal-body"><p style="margin-bottom:12px">진행 중인 경매를 강제 종료하는 사유를 입력해주세요. 종료 시 현재 최고 입찰자가 낙찰자로 선정될 수 있습니다.</p><label>종료 사유</label><textarea placeholder="사유를 입력하세요 (예: 작가 요청, 시스템 오류, 부정 입찰 의심 등)"></textarea></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('endModal')">취소</button><button class="btn btn-danger">경매 종료</button></div></div></div>
</div>
</body>
</html>
