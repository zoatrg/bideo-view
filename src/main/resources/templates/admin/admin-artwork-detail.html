<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/admin-layout}"
      th:with="activeMenu='artworks'">
<head>
    <meta charset="UTF-8">
    <title>작품 상세 - BIDEO Admin</title>
    <link rel="stylesheet" href="../../static/css/admin/admin-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
    <a th:href="@{/admin/artworks}" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        목록으로 돌아가기
    </a>
    <div class="page-header">
        <h1 class="page-title">작품 상세
            <span th:if="${artwork.status == 'DISPLAY'}" class="status-badge status-active">전시중</span>
            <span th:if="${artwork.status == 'HIDDEN'}" class="status-badge status-urgent">숨김</span>
        </h1>
    </div>
    <div class="detail-layout">
        <div class="detail-main">
            <div class="detail-section">
                <h3 class="detail-section-title">기본 정보</h3>
                <div class="detail-field"><span class="detail-field-label">작품명</span><span class="detail-field-value" th:text="${artwork.title}">작품명</span></div>
                <div class="detail-field"><span class="detail-field-label">아티스트</span><span class="detail-field-value" th:text="${artwork.artistName}">아티스트</span></div>
                <div class="detail-field"><span class="detail-field-label">카테고리</span><span class="detail-field-value" th:text="${artwork.category}">Digital Art</span></div>
            </div>
            <div class="detail-section">
                <h3 class="detail-section-title">기술 사양</h3>
                <div class="detail-field"><span class="detail-field-label">해상도</span><span class="detail-field-value" th:text="${artwork.resolution}">1920x1080</span></div>
                <div class="detail-field"><span class="detail-field-label">용량</span><span class="detail-field-value" th:text="${artwork.fileSize}">2.4MB</span></div>
            </div>
        </div>
        <div class="detail-sidebar">
            <div class="detail-sidebar-card">
                <div class="detail-sidebar-title">관리 작업</div>
                <div style="margin-bottom:8px;font-size:13px;color:var(--admin-text-secondary)">작품 노출 설정</div>
                <button th:if="${artwork.status == 'DISPLAY'}" class="btn btn-danger" style="width:100%" onclick="openModal('hideModal')">전시 중단</button>
                <button th:if="${artwork.status == 'HIDDEN'}" class="btn btn-primary" style="width:100%" onclick="openModal('displayModal')">전시 재개</button>
            </div>
        </div>
    </div>
</div>
<div layout:fragment="modals">
    <div class="modal-overlay" id="hideModal"><div class="modal"><div class="modal-header">전시 중단 처리</div><div class="modal-body"><label>중단 사유</label><textarea placeholder="사유를 상세히 입력하세요 (예: 작가 요청, 부적절한 콘텐츠 등)"></textarea></div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('hideModal')">취소</button><button class="btn btn-danger">중단 처리</button></div></div></div>
    <div class="modal-overlay" id="displayModal"><div class="modal"><div class="modal-header">전시 재개</div><div class="modal-body">이 작품의 전시를 재개합니다.</div><div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('displayModal')">취소</button><button class="btn btn-primary">확인</button></div></div></div>
</div>
</body>
</html>
